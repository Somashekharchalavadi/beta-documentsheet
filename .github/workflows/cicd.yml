name: CI/CD Pipeline

permissions:
  contents: write

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: Production

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_BASE_URL=${{ vars.VITE_BASE_URL }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: Production

    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            IMAGE_LOWER=$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')

            echo "Starting deployment for container image: $IMAGE_LOWER:latest"

            echo "${{ secrets.GHCR_DEPLOY_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

            docker pull $IMAGE_LOWER:latest

            docker stop documentsheet-frontend || true
            docker rm documentsheet-frontend || true

            docker run -d \
              --name documentsheet-frontend \
              --restart unless-stopped \
              -p 127.0.0.1:4002:80 \
              $IMAGE_LOWER:latest

            sleep 5
            curl --fail --silent --show-error http://127.0.0.1:4002/ > /dev/null

            docker image prune -f

            echo "✓ Deployment successful - Container updated and running on port 4002!"
