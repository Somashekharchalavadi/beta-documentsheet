name: CI/CD Pipeline

permissions:
  contents: write

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  COOLDOWN_SECONDS: 15
  CONTAINER_NAME: documentsheet-frontend
  HOST_PORT: 4002

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Prettier check
        run: npm run format:check

  build-and-push:
    runs-on: ubuntu-latest
    needs: quality
    environment: Production

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_BASE_URL=${{ vars.VITE_BASE_URL }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: Production

    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            set -euo pipefail

            IMAGE_LOWER=$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
            COOLDOWN="${{ env.COOLDOWN_SECONDS }}"
            CONTAINER="${{ env.CONTAINER_NAME }}"
            PORT="${{ env.HOST_PORT }}"
            HEALTH_URL="http://127.0.0.1:${PORT}/"

            echo "Deploying $IMAGE_LOWER:latest → $CONTAINER (port $PORT)"

            echo "${{ secrets.GHCR_DEPLOY_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

            docker pull "$IMAGE_LOWER:latest"

            echo "Stopping container..."
            docker stop "$CONTAINER" 2>/dev/null || true
            sleep "$COOLDOWN"

            docker rm "$CONTAINER" 2>/dev/null || true
            sleep "$COOLDOWN"

            docker run -d \
              --name "$CONTAINER" \
              --restart unless-stopped \
              -p "127.0.0.1:${PORT}:80" \
              "$IMAGE_LOWER:latest"

            echo "Waiting for health check..."
            sleep "$COOLDOWN"
            curl --fail --silent --show-error --retry 5 --retry-delay 3 "$HEALTH_URL" > /dev/null

            docker image prune -f
            echo "✓ Deployment successful — $CONTAINER on port $PORT"
