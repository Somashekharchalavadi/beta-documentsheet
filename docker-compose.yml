services:
  documentsheet-frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_BASE_URL: ${VITE_BASE_URL:-https://beta.server.documentsheet.com}
    image: documentsheet-frontend:latest
    container_name: documentsheet-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:4002:80"
